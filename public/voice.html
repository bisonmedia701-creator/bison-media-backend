<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>GT Auto Sales - Scratch & Win</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: auto; -webkit-overflow-scrolling: touch; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; }
        .container { max-width: 100%; margin: 0 auto; padding: 15px; padding-bottom: 120px; }
        .tap-screen { background: linear-gradient(145deg, #2d2d44, #1f1f33); border-radius: 20px; padding: 40px 20px; text-align: center; border: 3px solid #00c853; margin: 10px 0; }
        .tap-icon { font-size: 60px; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .tap-text { font-size: 24px; color: #00c853; font-weight: bold; margin: 15px 0; }
        .tap-btn { background: #00c853; color: white; border: none; padding: 20px; font-size: 20px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; }
        .header { text-align: center; padding: 15px 0; }
        .logo { font-size: 40px; }
        .header h1 { font-size: 22px; color: #ffd700; }
        .header p { color: #888; font-size: 14px; }
        .winner-section { display: none; text-align: center; margin: 10px 0; }
        .winner-badge { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #1a1a2e; padding: 10px 20px; border-radius: 25px; font-weight: bold; font-size: 14px; display: inline-block; text-transform: uppercase; }
        .customer-name { font-size: 28px; margin: 10px 0; }
        .chat-section { display: none; margin: 10px 0; }
        .chat-header { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 15px; padding: 15px; text-align: center; margin-bottom: 10px; }
        .chat-header .icon { font-size: 30px; }
        .chat-header .name { font-size: 16px; margin-top: 5px; }
        .chat-status { text-align: center; padding: 8px; color: #888; font-size: 12px; }
        .messages { background: rgba(0,0,0,0.3); border-radius: 15px; padding: 10px; max-height: 200px; overflow-y: auto; margin-bottom: 10px; }
        .msg { margin: 8px 0; padding: 10px; border-radius: 10px; font-size: 14px; line-height: 1.4; }
        .msg.sarah { background: rgba(102, 126, 234, 0.3); border-left: 3px solid #667eea; }
        .msg.customer { background: rgba(0, 200, 83, 0.2); border-right: 3px solid #00c853; text-align: right; }
        .msg-label { font-size: 10px; color: #888; margin-bottom: 3px; }
        .msg-text { font-size: 14px; }
        .input-section { background: #2d2d44; border-radius: 15px; padding: 10px; }
        .input-row { display: flex; gap: 10px; align-items: center; }
        .input-row input { flex: 1; padding: 15px; border-radius: 25px; border: 2px solid #667eea; background: rgba(255,255,255,0.1); color: white; font-size: 16px; min-height: 50px; }
        .input-row button { padding: 15px 25px; border-radius: 25px; background: #667eea; color: white; border: none; font-size: 16px; font-weight: bold; white-space: nowrap; }
        .voice-row { display: flex; gap: 10px; margin-top: 10px; }
        .voice-btn { flex: 1; padding: 15px; border-radius: 50px; border: 2px solid #ff4444; background: transparent; color: #ff4444; font-size: 16px; font-weight: bold; }
        .voice-btn.active { background: #ff4444; color: white; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .end-btn { padding: 15px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.3); background: transparent; color: white; font-size: 14px; }
        .appt-section { display: none; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin: 15px 0; }
        .appt-section h3 { color: #ffd700; margin-bottom: 15px; font-size: 18px; }
        .time-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .time-btn { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); color: white; padding: 15px 20px; border-radius: 10px; font-size: 16px; cursor: pointer; min-width: 80px; }
        .time-btn:active, .time-btn.selected { background: #00c853; border-color: #00c853; }
        .confirm-btn { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #1a1a2e; border: none; padding: 18px; font-size: 18px; border-radius: 15px; width: 100%; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .confirmed-section { display: none; text-align: center; padding: 40px 20px; }
        .confirmed-icon { font-size: 60px; }
        .confirmed-section h2 { color: #00c853; font-size: 22px; margin: 15px 0; }
        .confirmed-section p { color: #ffd700; font-size: 20px; }
        .confirmed-section .sub { color: #888; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🚗</div>
            <h1>GT Auto Sales</h1>
            <p>Scratch & Win Event</p>
        </div>
        <div class="tap-screen" id="tapScreen">
            <div class="tap-icon">👆</div>
            <div class="tap-text">Tap to Start</div>
            <p style="color: #888; margin-bottom: 20px;">Tap to talk to Sarah</p>
            <button class="tap-btn" onclick="startChat()">🎤 Talk to Sarah</button>
        </div>
        <div class="winner-section" id="winnerSection">
            <div class="winner-badge">🎉 Congratulations! You Won!</div>
            <div class="customer-name" id="customerName">...</div>
        </div>
        <div class="chat-section" id="chatSection">
            <div class="chat-header">
                <div class="icon">🤖</div>
                <div class="name">Sarah - AI Assistant</div>
            </div>
            <div class="chat-status" id="chatStatus">Sarah is greeting...</div>
            <div class="messages" id="messages"></div>
            <div class="input-section">
                <div class="input-row">
                    <input type="text" id="textInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter')sendMessage()">
                    <button onclick="sendMessage()">Send</button>
                </div>
                <div class="voice-row">
                    <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">🎤 Voice</button>
                    <button class="end-btn" onclick="endChat()">❌ End</button>
                </div>
            </div>
        </div>
        <div class="appt-section" id="apptSection">
            <h3>📅 Select Your Time - Saturday</h3>
            <div class="time-row">
                <button class="time-btn" onclick="selectTime(this, '10 AM')">10 AM</button>
                <button class="time-btn" onclick="selectTime(this, '2 PM')">2 PM</button>
                <button class="time-btn" onclick="selectTime(this, '4 PM')">4 PM</button>
            </div>
            <button class="confirm-btn" onclick="confirmAppt()">✓ Confirm Appointment</button>
        </div>
        <div class="confirmed-section" id="confirmedSection">
            <div class="confirmed-icon">✅</div>
            <h2>Appointment Confirmed!</h2>
            <p id="confirmedTime"></p>
            <p class="sub">We'll see you Saturday!</p>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let customerName = urlParams.get('name') || 'there';
        customerName = customerName.replace(/-/g, ' ');
        const firstName = customerName.split(' ')[0];
        document.getElementById('customerName').textContent = customerName;

        let isRecording = false;
        let isSpeaking = false;
        let selectedTime = '10 AM';
        let recognition = null;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            recognition.onresult = (event) => {
                const result = event.results[event.results.length - 1];
                const text = result[0].transcript.trim().toLowerCase();
                if (result.isFinal && text && !isSpeaking) {
                    processMessage(text);
                }
            };
            recognition.onerror = (e) => {};
            recognition.onend = () => {
                if (isRecording && !isSpeaking) {
                    try { recognition.start(); } catch(e) {}
                }
            };
        }

        function speak(text) {
            isSpeaking = true;
            document.getElementById('chatStatus').textContent = 'Sarah is speaking...';
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1;
            utterance.pitch = 1;
            utterance.volume = 1;
            const voices = speechSynthesis.getVoices();
            const female = voices.find(v => v.name.includes('Female') || v.name.includes('Samantha') || v.lang === 'en-US');
            if (female) utterance.voice = female;
            utterance.onend = () => {
                isSpeaking = false;
                document.getElementById('chatStatus').textContent = isRecording ? 'Listening...' : 'Tap voice to talk';
            };
            utterance.onerror = () => {
                isSpeaking = false;
                document.getElementById('chatStatus').textContent = 'Tap voice to talk';
            };
            speechSynthesis.speak(utterance);
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => {};
        }

        function startChat() {
            document.getElementById('tapScreen').style.display = 'none';
            document.getElementById('winnerSection').style.display = 'block';
            document.getElementById('chatSection').style.display = 'block';
            const greeting = `Hi ${firstName}! Congratulations! You've won a scratch and win prize from GT Auto Sales! I'm Sarah, and I'm here to help you redeem your prize in person. Would you like to schedule a time to come in and claim your reward this Saturday?`;
            addMessage('sarah', greeting);
            speak(greeting);
            setTimeout(() => { toggleVoice(); }, 6000);
        }

        function addMessage(who, text) {
            const msgs = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg ${who}`;
            div.innerHTML = `<div class="msg-label">${who === 'sarah' ? '🤖 Sarah' : '👤 You'}</div><div class="msg-text">${text}</div>`;
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function processMessage(msg) {
            addMessage('customer', msg);
            document.getElementById('chatStatus').textContent = 'Sarah is thinking...';
            const m = msg.toLowerCase();
            let response;
            if (m.includes('yes') || m.includes('yeah') || m.includes('yep') || m.includes('sure') || m.includes('ok')) {
                response = `Great! I can help you schedule a time to redeem your prize. Would you prefer 10 AM, 2 PM, or 4 PM this Saturday? Tap a time below!`;
                document.getElementById('apptSection').style.display = 'block';
                document.getElementById('apptSection').scrollIntoView({ behavior: 'smooth' });
            }
            else if (m.includes('no') || m.includes('nope')) {
                response = `No problem! Call us at (888) 308-9827 if you change your mind. Have a great day!`;
            }
            else if (m.includes('10') || m.includes('ten') || m.includes('morning')) {
                selectedTime = '10 AM';
                document.querySelectorAll('.time-btn')[0].classList.add('selected');
                response = `Perfect! 10 AM on Saturday. Tap Confirm below!`;
                document.getElementById('apptSection').style.display = 'block';
            }
            else if (m.includes('2') || m.includes('two') || m.includes('afternoon')) {
                selectedTime = '2 PM';
                document.querySelectorAll('.time-btn')[1].classList.add('selected');
                response = `Great! 2 PM on Saturday. Tap Confirm below!`;
                document.getElementById('apptSection').style.display = 'block';
            }
            else if (m.includes('4') || m.includes('four') || m.includes('late')) {
                selectedTime = '4 PM';
                document.querySelectorAll('.time-btn')[2].classList.add('selected');
                response = `Excellent! 4 PM on Saturday. Tap Confirm below!`;
                document.getElementById('apptSection').style.display = 'block';
            }
            else {
                response = `I didn't catch that. Would you like to schedule a time to redeem your prize this Saturday? Just say "yes"!`;
            }
            addMessage('sarah', response);
            speak(response);
            document.getElementById('chatStatus').textContent = 'Conversation active';
        }

        function sendMessage() {
            const input = document.getElementById('textInput');
            const msg = input.value.trim();
            if (!msg) return;
            processMessage(msg);
            input.value = '';
        }

        function toggleVoice() {
            if (!recognition) {
                document.getElementById('chatStatus').textContent = 'Voice not supported';
                return;
            }
            if (isRecording) {
                isRecording = false;
                recognition.stop();
                document.getElementById('voiceBtn').textContent = '🎤 Voice';
                document.getElementById('voiceBtn').classList.remove('active');
            } else {
                isRecording = true;
                recognition.start();
                document.getElementById('voiceBtn').textContent = '⏹️ Stop';
                document.getElementById('voiceBtn').classList.add('active');
                document.getElementById('chatStatus').textContent = 'Listening...';
            }
        }

        function selectTime(btn, time) {
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedTime = time;
        }

        function confirmAppt() {
            document.getElementById('chatSection').style.display = 'none';
            document.getElementById('apptSection').style.display = 'none';
            document.getElementById('confirmedSection').style.display = 'block';
            document.getElementById('confirmedTime').textContent = `📅 ${selectedTime} - Saturday`;
            speak(`Perfect! Your appointment is confirmed for ${selectedTime} this Saturday. We look forward to seeing you, ${firstName}!`);
        }

        function endChat() {
            isRecording = false;
            if (recognition) recognition.stop();
            speechSynthesis.cancel();
            addMessage('sarah', 'Thank you for visiting GT Auto Sales! Have a great day!');
            speak('Thank you for visiting GT Auto Sales! Have a great day!');
        }
    </script>
<style>
#minimax-floating-ball {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 10px 12px;
  background: #222222;
  border-radius: 12px;
  display: flex;
  align-items: center;
  color: #F8F8F8;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
  z-index: 9999;
  transition: all 0.3s ease;
  overflow: hidden;
  cursor: pointer;
}

#minimax-floating-ball:hover {
  transform: translateY(-2px);
  background: #383838;
}

  display: flex;

  background-repeat: no-repeat;
  background-position: center;
  background-size: 14px 11px;
  background-color: #8FD1FF;
  border-radius: 4px;

.minimax-ball-text {
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
}

.minimax-close-icon {
  margin-left: 8px;
  font-size: 16px;
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;

.minimax-close-icon:hover {
  opacity: 1;

</style>
<div id="minimax-floating-ball">
  <div class="minimax-ball-content">
    <div class="minimax-logo-wave"></div>
    <span class="minimax-ball-text">Created by MiniMax Agent</span>
  </div>
  <div class="minimax-close-icon">×</div>
</div>
<script>
// Initialize floating ball functionality
function initFloatingBall() {
  const ball = document.getElementById('minimax-floating-ball');
  if (!ball) return;

  // Initial animation
  ball.style.opacity = '0';
  ball.style.transform = 'translateY(20px)';

  setTimeout(() => {
    ball.style.opacity = '1';
    ball.style.transform = 'translateY(0)';
  }, 500);

  // Handle logo click
  const ballContent = ball.querySelector('.minimax-ball-content');
  ballContent.addEventListener('click', function (e) {
    e.stopPropagation();
    window.open('https://agent.minimax.io/', '_blank');
    ball.style.transform = 'scale(0.95)';
    setTimeout(() => {
      ball.style.transform = 'scale(1)';
    }, 100);
  });

  // Handle close button click
  const closeIcon = ball.querySelector('.minimax-close-icon');
  closeIcon.addEventListener('click', function (e) {
    e.stopPropagation();
    ball.style.opacity = '0';
    ball.style.transform = 'translateY(20px)';

    setTimeout(() => {
      ball.style.display = 'none';
    }, 300);
  });
}

// Initialize when DOM is ready
document.addEventListener('DOMContentLoaded', initFloatingBall); 
</script>
</body>
</html>
